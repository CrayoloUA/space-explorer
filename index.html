<!doctype html>                        <!-- declara que el documento es HTML5 -->
<html lang="es">                       <!-- define el idioma de la página como español -->
  <head>
    <meta charset="UTF-8" />          <!-- codificación de caracteres UTF-8 para soportar tildes y símbolos -->
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />  <!-- ícono de la pestaña del navegador -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />  <!-- hace la página responsive en móviles -->
    <title>Space Explorer</title>     <!-- título que aparece en la pestaña del navegador -->
    <link rel="preconnect" href="https://fonts.googleapis.com">   <!-- preconecta a Google Fonts para cargar más rápido -->
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>  <!-- preconecta al CDN de archivos de fuentes -->
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;700;800&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- carga las fuentes Exo 2 y Space Grotesk desde Google Fonts -->
  </head>
  <body>
    <div id="root"></div>             <!-- contenedor vacío donde React inyecta toda la app -->
    <script type="module" src="/src/main.jsx"></script>  <!-- carga el punto de entrada de la app -->
  </body>
</html>
